# Session Lifecycle Management

## Action
Before starting a coding task, run `avos session-status --json` to check if a session is active. If not, start one with `avos session-start --json "goal"`. End with `avos session-end --json` when complete.

## Evidence
- Sessions create audit trails for AI agent activity
- Enterprise environments require tracking of changes
- Session artifacts help future developers understand what was done

