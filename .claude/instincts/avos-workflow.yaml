# Search Before Implementing

## Action
Before implementing new functionality, run `avos ask --json "is there existing implementation for X?"` to check if similar code already exists.

## Evidence
- Prevents code duplication
- Maintains consistency with existing patterns
- Leverages existing tested implementations

