# Build and upload git_aware_coding_agent to TestPyPI or PyPI.
#
# Secrets — add under Settings → Secrets and variables → Actions (repository secrets):
#   PYPI_API_TOKEN       — API token for https://pypi.org (username is always __token__)
#   TESTPYPI_API_TOKEN   — API token for https://test.pypi.org (only for TestPyPI runs)
#
# Optional: create GitHub Environments "pypi" / "testpypi" with protection rules, then
# add the same secret names on each environment if you prefer scoped secrets.
#
# Triggers:
#   • workflow_dispatch — choose testpypi or pypi
#   • release published   — uploads to PyPI only (use after tagging / GitHub Release)

name: Publish

# Keep in sync with [project].version in pyproject.toml (source of truth for builds).
env:
  PACKAGE_VERSION: "0.0.1"

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Publish target"
        required: true
        default: "pypi"
        type: choice
        options:
          - pypi
          - testpypi
  release:
    types: [published]

permissions:
  contents: read

# One publish at a time per repo (avoid overlapping uploads).
concurrency:
  group: publish-${{ github.repository }}
  cancel-in-progress: false

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify pyproject.toml version matches workflow
        run: |
          version=$(python3 -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          test "$version" = "${{ env.PACKAGE_VERSION }}"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install --upgrade build twine

      - name: Build sdist and wheel
        run: python -m build

      - name: Check metadata and files
        run: python -m twine check dist/*

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Upload to package index
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: Resolve publish target
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "target=pypi" >> "$GITHUB_OUTPUT"
          else
            echo "target=${{ github.event.inputs.target }}" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Twine
        run: pip install --upgrade twine

      - name: Publish to TestPyPI
        if: steps.meta.outputs.target == 'testpypi'
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.TESTPYPI_API_TOKEN }}
        run: twine upload --non-interactive --repository testpypi dist/*

      - name: Publish to PyPI
        if: steps.meta.outputs.target == 'pypi'
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: twine upload --non-interactive dist/*
